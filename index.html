<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-alt: #222633;
    --accent: #10b981;
    --accent2: #6366f1;
    --accent3: #f59e0b;
    --accent4: #ef4444;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #2d3348;
    --success: #10b981;
    --warning: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15, 17, 23, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  nav .nav-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; gap: 2rem;
    height: 56px;
  }
  nav .logo {
    font-weight: 700; font-size: 1.2rem;
    color: var(--accent);
    display: flex; align-items: center; gap: .5rem;
  }
  nav .nav-links { display: flex; gap: .25rem; }
  nav .nav-links a {
    color: var(--text-muted); text-decoration: none;
    padding: .5rem 1rem; border-radius: 8px;
    font-size: .875rem; font-weight: 500;
    transition: all .2s;
  }
  nav .nav-links a:hover, nav .nav-links a.active {
    color: var(--text); background: var(--card);
  }

  /* LAYOUT */
  main {
    max-width: 1200px; margin: 0 auto;
    padding: 2rem;
  }
  section { margin-bottom: 3rem; scroll-margin-top: 72px; }
  section h2 {
    font-size: 1.5rem; font-weight: 700;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: .75rem;
  }
  section h2 .badge {
    font-size: .75rem; font-weight: 600;
    padding: .25rem .75rem; border-radius: 99px;
    background: var(--accent); color: #000;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card); border-radius: 12px;
    padding: 1.25rem 1.5rem;
    border: 1px solid var(--border);
  }
  .stat-card .label {
    font-size: .75rem; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-muted);
    margin-bottom: .25rem;
  }
  .stat-card .value {
    font-size: 2rem; font-weight: 700;
  }
  .stat-card .sub {
    font-size: .8rem; color: var(--text-muted);
    margin-top: .25rem;
  }
  .stat-card .sub.positive { color: var(--success); }
  .stat-card .sub.negative { color: var(--accent4); }

  /* CHART */
  .chart-container {
    background: var(--card); border-radius: 12px;
    padding: 1.5rem; border: 1px solid var(--border);
    position: relative; height: 320px;
  }

  /* MENU */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .day-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .day-card .day-header {
    padding: 1rem 1.25rem;
    background: var(--card-alt);
    font-weight: 700; font-size: 1rem;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .day-card .day-header .protein-tag {
    font-size: .7rem; font-weight: 600;
    padding: .2rem .6rem; border-radius: 99px;
    background: var(--accent); color: #000;
  }
  .day-card .day-header .toggle-icon {
    transition: transform .2s;
    color: var(--text-muted);
  }
  .day-card .day-header.open .toggle-icon {
    transform: rotate(180deg);
  }
  .day-card .day-body {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
  }
  .day-card .day-body.open {
    max-height: 2000px;
  }
  .meal {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .meal-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: .5rem;
  }
  .meal-name {
    font-weight: 600; font-size: .9rem;
  }
  .meal-kcal {
    font-size: .75rem; color: var(--accent3);
    font-weight: 600;
  }
  .meal-title {
    font-size: .8rem; color: var(--accent);
    margin-bottom: .5rem; font-style: italic;
  }
  .meal ul {
    list-style: none; padding: 0;
  }
  .meal li {
    font-size: .8rem; color: var(--text-muted);
    padding: .15rem 0;
    padding-left: 1rem;
    position: relative;
  }
  .meal li::before {
    content: "·"; position: absolute; left: 0;
    color: var(--border); font-weight: 700;
  }
  .meal .prep-note {
    font-size: .75rem; color: var(--accent2);
    background: rgba(99,102,241,.1);
    padding: .5rem .75rem; border-radius: 8px;
    margin-bottom: .5rem;
  }

  /* SHOPPING LIST */
  .shop-columns {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .shop-card {
    background: var(--card); border-radius: 12px;
    padding: 1.25rem; border: 1px solid var(--border);
  }
  .shop-card h3 {
    font-size: .9rem; font-weight: 700;
    margin-bottom: .75rem; color: var(--accent);
  }
  .shop-card label {
    display: flex; align-items: center; gap: .5rem;
    font-size: .85rem; padding: .3rem 0;
    cursor: pointer; color: var(--text-muted);
    transition: all .15s;
  }
  .shop-card label:hover { color: var(--text); }
  .shop-card input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px; height: 16px;
  }
  .shop-card label.checked {
    text-decoration: line-through;
    opacity: .4;
  }

  /* EXERCISE */
  .exercise-week {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 1rem; overflow: hidden;
  }
  .exercise-week .ew-header {
    padding: 1rem 1.25rem;
    background: var(--card-alt);
    font-weight: 700;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .exercise-week .ew-body {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
  }
  .exercise-week .ew-body.open { max-height: 5000px; }
  .exercise-day {
    padding: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .exercise-day h4 {
    font-size: .95rem; font-weight: 700;
    color: var(--accent2); margin-bottom: .75rem;
  }
  .exercise-phase {
    margin-bottom: .75rem;
  }
  .exercise-phase .phase-label {
    font-size: .7rem; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-muted);
    margin-bottom: .35rem; font-weight: 600;
  }
  .exercise-phase ol, .exercise-phase ul {
    padding-left: 1.25rem;
  }
  .exercise-phase li {
    font-size: .85rem; color: var(--text-muted);
    padding: .15rem 0;
  }

  /* WEEK TABS */
  .week-tabs {
    display: flex; gap: .5rem; margin-bottom: 1.5rem;
  }
  .week-tabs button {
    padding: .5rem 1.25rem; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card); color: var(--text-muted);
    font-weight: 600; font-size: .85rem;
    cursor: pointer; transition: all .2s;
  }
  .week-tabs button.active {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }
  .week-content { display: none; }
  .week-content.active { display: block; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    main { padding: 1rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .menu-grid { grid-template-columns: 1fr; }
    .shop-columns { grid-template-columns: 1fr; }
    nav .nav-inner { gap: 1rem; overflow-x: auto; }
    nav .nav-links a { white-space: nowrap; }
  }
</style>
</head>

  <div id="week2" class="week-content">

</section>

<!-- ========== COMPRAS ========== -->
<section id="compras">

  <div id="shop-reposicion" class="week-content">

</section>

<!-- ========== EJERCICIO ========== -->
<section id="ejercicio">

  <div id="exercise-container"></div>
</section>

</main>

function renderStats() {
  const p = DATOS.pesajes;
  if (p.length === 0) return;

  const last = p[p.length - 1];
  const first = p[0];
  const imc = (last.peso / (DATOS.altura/100) ** 2).toFixed(1);

  document.getElementById('peso-actual').textContent = last.peso + ' kg';
  document.getElementById('peso-faltan').textContent = (last.peso - DATOS.objetivo).toFixed(1) + ' kg por perder';

  if (p.length > 1) {
    const prev = p[p.length - 2];
    const diff = (last.peso - prev.peso).toFixed(1);
    const el = document.getElementById('peso-var');
    if (diff <= 0) { el.textContent = diff + ' kg'; el.className = 'sub positive'; }
    else { el.textContent = '+' + diff + ' kg'; el.className = 'sub negative'; }
  } else {
    document.getElementById('peso-var').textContent = 'Primer pesaje registrado';
  }

  document.getElementById('imc-actual').textContent = imc;
  const imcNum = parseFloat(imc);
  const imcEl = document.getElementById('imc-cat');
  if (imcNum < 18.5) imcEl.textContent = 'Bajo peso';
  else if (imcNum < 25) { imcEl.textContent = 'Normal'; imcEl.style.color = 'var(--success)'; }
  else if (imcNum < 30) { imcEl.textContent = 'Sobrepeso'; imcEl.style.color = 'var(--warning)'; }
  else { imcEl.textContent = 'Obesidad'; imcEl.style.color = 'var(--accent4)'; }

  if (last.cintura) document.getElementById('cintura-actual').textContent = last.cintura;
}

function renderChart() {
  const ctx = document.getElementById('weightChart').getContext('2d');
  const p = DATOS.pesajes;

  const labels = p.length > 0 ? p.map(d => d.fecha) : ['Inicio', '', '', '', '', 'Meta'];
  const data = p.length > 0 ? p.map(d => d.peso) : [];

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Peso (kg)',
          data: data,
          borderColor: '#10b981',
          backgroundColor: 'rgba(16,185,129,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 5,
          pointBackgroundColor: '#10b981',
        },
        {
          label: 'Objetivo',
          data: labels.map(() => DATOS.objetivo),
          borderColor: 'rgba(99,102,241,0.5)',
          borderDash: [5, 5],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8' } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(45,51,72,0.5)' } },
        y: {
          ticks: { color: '#94a3b8' },
          grid: { color: 'rgba(45,51,72,0.5)' },
          suggestedMin: 73,
          suggestedMax: p.length > 0 ? Math.max(...p.map(d=>d.peso)) + 2 : 90
        }
      }
    }
  });
}

function renderMenu(weekData, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  weekData.forEach(day => {
    const total = day.comidas.reduce((s, m) => s + m.kcal, 0);
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span>${day.dia} <span class="protein-tag">${day.proteina}</span></span>
        <span style="font-size:.8rem;color:var(--text-muted)">${total} kcal <span class="toggle-icon">▼</span></span>
      </div>
      <div class="day-body">
        <div class="meal"><div class="prep-note">🔪 ${day.prep}</div></div>
        ${day.comidas.map(m => `
          <div class="meal">
            <div class="meal-header">
              <span class="meal-name">${m.tipo}</span>
              <span class="meal-kcal">~${m.kcal} kcal</span>
            </div>
            <div class="meal-title">${m.nombre}</div>
            <ul>${m.items.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

function showWeek(n) {
  document.querySelectorAll('.week-tabs button').forEach((b,i) => {
    if (b.closest('#menu')) b.classList.toggle('active', i === n-1);
  });
  document.getElementById('week1').classList.toggle('active', n === 1);
  document.getElementById('week2').classList.toggle('active', n === 2);
}

function renderShop(data, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  Object.entries(data).forEach(([cat, items]) => {
    const card = document.createElement('div');
    card.className = 'shop-card';
    card.innerHTML = `<h3>${cat}</h3>` +
      items.map((item, i) => `
        <label id="shop-${containerId}-${cat}-${i}">
          <input type="checkbox" onchange="this.parentElement.classList.toggle('checked')">
          ${item}
        </label>
      `).join('');
    container.appendChild(card);
  });
}

function showShop(which) {
  const tabs = document.querySelectorAll('#compras .week-tabs button');
  tabs[0].classList.toggle('active', which === 'principal');
  tabs[1].classList.toggle('active', which === 'reposicion');
  document.getElementById('shop-principal').classList.toggle('active', which === 'principal');
  document.getElementById('shop-reposicion').classList.toggle('active', which === 'reposicion');
}

function renderExercise() {
  const container = document.getElementById('exercise-container');
  container.innerHTML = '';

  EJERCICIO.semanas.forEach((semana, si) => {
    const week = document.createElement('div');
    week.className = 'exercise-week';
    week.innerHTML = `
      <div class="ew-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span>${semana.nombre}</span>
        <span style="color:var(--text-muted)">▼</span>

}
